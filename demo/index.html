<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go Chat 2.0 · Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f7f4;
    --mint: #7dc4a0;
    --mint-light: #b8dfc9;
    --mint-pale: #daf0e6;
    --text: #2d4a3e;
    --text-soft: #6a8f7e;
    --text-muted: #a8c4b8;
    --white: #ffffff;
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Sans SC', sans-serif;
    overflow: hidden;
  }

  .bg-blobs {
    position: fixed; inset: 0; pointer-events: none; overflow: hidden;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(65px);
    opacity: 0.5;
  }
  .blob-1 {
    width: 520px; height: 520px;
    background: radial-gradient(circle, #c5e8d5, #a5d4bc);
    top: -120px; left: -100px;
  }
  .blob-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #d2ecde, #b5dbca);
    bottom: -80px; right: -80px;
  }
  .blob-3 {
    width: 250px; height: 250px;
    background: radial-gradient(circle, #e5f5ec, #c8e8d5);
    top: 38%; left: 54%;
    opacity: 0.3;
  }

  .bg-dots {
    position: fixed; inset: 0; pointer-events: none;
    background-image: radial-gradient(circle, rgba(125,196,160,0.2) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  .stage {
    display: flex;
    align-items: center;
    gap: 52px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── 左侧信息 ── */
  .info {
    width: 195px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .logo {
    font-family: 'Noto Serif SC', serif;
    font-size: 40px;
    font-weight: 200;
    color: var(--text);
    line-height: 1.2;
    letter-spacing: 4px;
  }
  .logo em {
    font-style: normal;
    color: var(--mint);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--white);
    border: 1.5px solid var(--mint-light);
    color: var(--mint);
    font-size: 10px;
    letter-spacing: 2px;
    padding: 4px 12px 4px 9px;
    border-radius: 20px;
    width: fit-content;
    box-shadow: 0 2px 10px rgba(125,196,160,0.18);
    font-weight: 500;
  }
  .badge-dot {
    width: 5px; height: 5px;
    background: var(--mint);
    border-radius: 50%;
    animation: blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, var(--mint-light), transparent);
  }

  .tagline {
    color: var(--text-soft);
    font-size: 12.5px;
    line-height: 2.2;
    font-weight: 300;
    padding-left: 12px;
    border-left: 2px solid var(--mint-pale);
    font-family: 'Noto Sans SC', sans-serif;
    letter-spacing: 0.5px;
  }

  .features {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .feat {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 300;
    transition: color 0.2s;
    cursor: default;
  }
  .feat:hover { color: var(--text); }
  .feat::before {
    content: '';
    width: 4px; height: 4px;
    background: var(--mint-light);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .made-by {
    color: var(--text-muted);
    font-size: 11px;
    letter-spacing: 0.5px;
    font-weight: 300;
  }

  /* ── 手机外壳 ── */
  .phone-outer {
    position: relative;
    width: 338px;
    height: 718px;
    background: linear-gradient(170deg, #fafffe 0%, #f2faf6 50%, #eaf6f0 100%);
    border-radius: 50px;
    box-shadow:
      0 0 0 1px rgba(125,196,160,0.28),
      0 0 0 2.5px rgba(255,255,255,0.92),
      0 0 0 3.5px rgba(125,196,160,0.12),
      0 40px 80px rgba(90,150,120,0.16),
      0 12px 30px rgba(90,150,120,0.1),
      inset 0 1px 0 rgba(255,255,255,0.98),
      inset 0 -1px 0 rgba(125,196,160,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 13px 11px 15px;
    gap: 9px;
  }
  .phone-outer::before {
    content: '';
    position: absolute;
    left: -3.5px; top: 118px;
    width: 3.5px; height: 34px;
    background: rgba(125,196,160,0.35);
    border-radius: 2px 0 0 2px;
    box-shadow: 0 50px 0 rgba(125,196,160,0.35), 0 95px 0 rgba(125,196,160,0.35);
  }
  .phone-outer::after {
    content: '';
    position: absolute;
    right: -3.5px; top: 148px;
    width: 3.5px; height: 64px;
    background: rgba(125,196,160,0.35);
    border-radius: 0 2px 2px 0;
  }

  .notch {
    width: 115px; height: 28px;
    background: #e5f5ec;
    border-radius: 0 0 18px 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-shrink: 0;
    position: relative;
    z-index: 2;
  }
  .notch-cam {
    width: 9px; height: 9px;
    background: radial-gradient(circle at 35% 35%, #b5d8c5, #78a890);
    border-radius: 50%;
    border: 1px solid rgba(125,196,160,0.25);
  }
  .notch-speaker {
    width: 44px; height: 5px;
    background: rgba(125,196,160,0.2);
    border-radius: 3px;
  }

  .screen {
    flex: 1;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    background: #f5faf7;
    position: relative;
  }
  .screen iframe {
    width: 390px;
    height: 100%;
    border: none;
    transform-origin: top left;
    transform: scale(0.811);
    display: block;
  }

  .home-bar {
    width: 110px; height: 4px;
    background: rgba(125,196,160,0.22);
    border-radius: 2px;
    flex-shrink: 0;
  }

  .shimmer {
    position: absolute; inset: 0;
    border-radius: 50px;
    overflow: hidden;
    pointer-events: none;
  }
  .shimmer::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 80px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
    animation: sweep 6s ease-in-out infinite;
    animation-delay: 2s;
  }
  @keyframes sweep {
    0%   { transform: translateX(-120px) skewX(-12deg); }
    100% { transform: translateX(480px) skewX(-12deg); }
  }

  /* ── 右侧注解 ── */
  .right-note {
    width: 115px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    align-self: flex-end;
    padding-bottom: 18px;
  }
  .note-item {
    border-left: 2px solid var(--mint-pale);
    padding-left: 12px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .note-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
    font-family: monospace;
  }
  .note-val {
    font-size: 12px;
    color: var(--text-soft);
    font-weight: 300;
    line-height: 1.6;
  }
  .note-val.live {
    color: var(--mint);
    font-size: 11px;
    letter-spacing: 1px;
    font-weight: 500;
  }

  .deco {
    position: fixed;
    pointer-events: none;
    opacity: 0.1;
    font-size: 88px;
    user-select: none;
  }
  .deco-1 { top: 4%; right: 7%; transform: rotate(18deg); }
  .deco-2 { bottom: 6%; left: 4%; transform: rotate(-14deg); font-size: 60px; }
</style>
</head>
<body>
<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>
<div class="bg-dots"></div>
<div class="deco deco-1">🌿</div>
<div class="deco deco-2">🌱</div>

<div class="stage">

  <!-- 左侧 -->
  <div class="info">
    <div class="logo">Go<br><em>Chat</em></div>
    <div class="badge"><span class="badge-dot"></span>V 2.0 · BETA</div>
    <div class="divider"></div>
    <div class="tagline">
      与 Ghost 的<br>异国婚姻模拟器<br>——他很少说话<br>但每句都算数
    </div>
    <div class="divider"></div>
    <div class="features">
      <div class="feat">Claude AI 双语对话</div>
      <div class="feat">朋友圈系统</div>
      <div class="feat">用户个人资料页</div>
      <div class="feat">Manchester 实时天气</div>
      <div class="feat">番茄钟打工系统</div>
      <div class="feat">会员卡 · 购物专柜</div>
      <div class="feat">成就系统 · 单词学习</div>
      <div class="feat">植树节限定商品</div>
    </div>
    <div class="made-by">made with ♡ & classified info</div>
  </div>

  <!-- 手机 -->
  <div class="phone-outer">
    <div class="shimmer"></div>
    <div class="notch">
      <div class="notch-cam"></div>
      <div class="notch-speaker"></div>
    </div>
    <div class="screen">
      <iframe
        src="https://go-chat-ivory.vercel.app/"
        scrolling="yes"
        allowfullscreen
        title="Go Chat 2.0"
      ></iframe>
    </div>
    <div class="home-bar"></div>
  </div>

  <!-- 右侧 -->
  <div class="right-note">
    <div class="note-item">
      <div class="note-label">STATUS</div>
      <div class="note-val live">● LIVE DEMO</div>
    </div>
    <div class="note-item">
      <div class="note-label">BACKEND</div>
      <div class="note-val">Vercel<br>Key Hidden</div>
    </div>
    <div class="note-item">
      <div class="note-label">MODEL</div>
      <div class="note-val">Claude<br>Haiku 4.5</div>
    </div>
    <div class="note-item">
      <div class="note-label">STACK</div>
      <div class="note-val">HTML · CSS<br>Vanilla JS</div>
    </div>
    <div class="note-item">
      <div class="note-label">DEPLOY</div>
      <div class="note-val">Vercel<br>+ GitHub</div>
    </div>
  </div>

</div>
</body>
</html>
